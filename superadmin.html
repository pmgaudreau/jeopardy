<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDK NINE Trivia — Super Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        :root{
            --bg:#000;--bg-card:#111;--bg-elevated:#1a1a1a;--bg-input:#0d0d0d;
            --gold:#FFD700;--gold-dim:#b8960f;--gold-bright:#ffe44d;
            --red:#e63946;--green:#2ecc71;--blue:#4a90d9;
            --text:#fff;--text-sec:#b0b0b0;--text-muted:#666;
            --border:#333;--radius:10px;
            --fh:'Oswald','Impact',sans-serif;
            --fs:'Rajdhani','Inter',sans-serif;
            --fb:'Inter',system-ui,sans-serif;
        }
        body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;}

        .top-bar{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:1px solid var(--border);background:var(--bg-card);}
        .top-bar h1{font-family:var(--fh);font-size:1.3rem;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;}
        .top-bar .badge{font-family:var(--fs);font-size:.85rem;color:var(--text-muted);}

        .container{max-width:900px;margin:0 auto;padding:1.5rem;}

        .login-card{max-width:400px;margin:4rem auto;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;text-align:center;}
        .login-card h2{font-family:var(--fh);color:var(--gold);font-size:1.4rem;margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.06em;}
        .login-card p{color:var(--text-sec);font-size:.85rem;margin-bottom:1.5rem;}
        .login-card input{width:100%;padding:.75rem 1rem;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--fh);font-size:1.1rem;text-align:center;letter-spacing:2px;outline:none;margin-bottom:1rem;}
        .login-card input:focus{border-color:var(--gold);}
        .login-card .err{color:var(--red);font-size:.8rem;margin-bottom:.75rem;min-height:1.2em;}

        .btn{display:inline-flex;align-items:center;justify-content:center;padding:.6rem 1.2rem;border:none;border-radius:var(--radius);font-family:var(--fh);font-weight:600;cursor:pointer;font-size:.9rem;text-transform:uppercase;letter-spacing:.04em;transition:all .15s;}
        .btn-gold{background:var(--gold);color:#000;}.btn-gold:hover{background:var(--gold-bright);}
        .btn-red{background:var(--red);color:#fff;}.btn-red:hover{background:#ff4d5a;}
        .btn-outline{background:transparent;color:var(--text-sec);border:1px solid var(--border);}.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
        .btn-block{width:100%;}
        .btn-sm{font-size:.75rem;padding:.4rem .8rem;}

        .summary{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;}
        .stat-card{flex:1;min-width:140px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center;}
        .stat-card .val{font-family:var(--fh);font-size:2rem;color:var(--gold);}
        .stat-card .lbl{font-family:var(--fs);font-size:.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-top:.2rem;}

        .room-list{display:flex;flex-direction:column;gap:.75rem;}
        .room-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;display:flex;align-items:center;gap:1rem;transition:border-color .2s;}
        .room-card:hover{border-color:var(--gold-dim);}
        .room-code{font-family:var(--fh);font-size:1.3rem;color:var(--gold);letter-spacing:2px;min-width:100px;}
        .room-info{flex:1;display:flex;flex-direction:column;gap:.2rem;}
        .room-meta{display:flex;gap:1rem;flex-wrap:wrap;align-items:center;}
        .room-meta .tag{font-family:var(--fs);font-size:.8rem;padding:.15rem .5rem;border-radius:6px;background:var(--bg-elevated);color:var(--text-sec);}
        .room-meta .tag.players{color:var(--green);}
        .room-meta .tag.round{color:var(--gold);}
        .room-meta .tag.phase{color:var(--blue);}
        .room-actions{display:flex;gap:.5rem;flex-shrink:0;}

        .empty{text-align:center;padding:3rem;color:var(--text-muted);font-family:var(--fs);font-size:1rem;}

        .hidden{display:none!important;}
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2>Super Admin</h2>
        <p>Enter the admin passphrase to manage all game rooms.</p>
        <input type="password" id="passphrase" placeholder="Passphrase" autofocus>
        <div class="err" id="login-err"></div>
        <button class="btn btn-gold btn-block" onclick="doLogin()" title="Authenticate with the admin passphrase">Enter</button>
    </div>
</div>

<div id="main-screen" class="hidden">
    <div class="top-bar">
        <h1>Super Admin</h1>
        <div style="display:flex;align-items:center;gap:.5rem;">
            <a href="admin.html" class="btn btn-outline btn-sm" title="Host control panel">Admin</a>
            <span class="badge">PDK NINE Trivia</span>
        </div>
    </div>
    <div class="container">
        <div class="summary">
            <div class="stat-card"><div class="val" id="total-rooms">0</div><div class="lbl">Active Rooms</div></div>
            <div class="stat-card"><div class="val" id="total-players">0</div><div class="lbl">Total Players</div></div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
            <h2 style="font-family:var(--fh);font-size:1rem;color:var(--text-sec);text-transform:uppercase;letter-spacing:.06em;">Game Rooms</h2>
            <button class="btn btn-outline btn-sm" onclick="refresh()" title="Refresh the list of active rooms">Refresh</button>
        </div>
        <div class="room-list" id="room-list">
            <div class="empty">Loading...</div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="config.js"></script>
<script>
const PASSPHRASE = 'pdknine2026';
let authed = false;

document.getElementById('passphrase').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function doLogin() {
    const val = document.getElementById('passphrase').value.trim();
    if (val === PASSPHRASE) {
        authed = true;
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        startListening();
    } else {
        document.getElementById('login-err').textContent = 'Incorrect passphrase.';
    }
}

let roomsRef = db.ref('trivia-rooms');
let allRooms = {};

function startListening() {
    roomsRef.on('value', snap => {
        allRooms = snap.val() || {};
        render();
    });
}

function render() {
    const entries = Object.entries(allRooms);
    document.getElementById('total-rooms').textContent = entries.length;

    let totalPlayers = 0;
    const list = document.getElementById('room-list');

    if (!entries.length) {
        list.innerHTML = '<div class="empty">No active game rooms.</div>';
        document.getElementById('total-players').textContent = '0';
        return;
    }

    list.innerHTML = entries.map(([code, room]) => {
        const teams = room.teams ? Object.keys(room.teams) : [];
        const playerCount = teams.length;
        totalPlayers += playerCount;

        const state = room.state || {};
        const roundLabels = {1:'Round 1', 2:'Double Jeopardy', 3:'Final Jeopardy'};
        const round = roundLabels[state.round] || 'Not started';
        const phase = state.phase || 'idle';

        return `<div class="room-card">
            <div class="room-code">${esc(code)}</div>
            <div class="room-info">
                <div class="room-meta">
                    <span class="tag players" title="Number of teams in this room">👥 ${playerCount} team${playerCount!==1?'s':''}</span>
                    <span class="tag round" title="Current round">${esc(round)}</span>
                    <span class="tag phase" title="Current game phase">${esc(phase)}</span>
                </div>
            </div>
            <div class="room-actions">
                <button class="btn btn-outline btn-sm" onclick="clearRoom('${esc(code)}')" title="Reset all data in this room (teams, scores, board) but keep the room">Clear</button>
                <button class="btn btn-red btn-sm" onclick="deleteRoom('${esc(code)}')" title="Permanently delete this room and all its data">Delete</button>
            </div>
        </div>`;
    }).join('');

    document.getElementById('total-players').textContent = totalPlayers;
}

function clearRoom(code) {
    if (!confirm('Clear all data in room "' + code + '"?\n\nThis will remove all teams, scores, answers, and board data. The room code will still exist but will be empty.')) return;
    const ref = db.ref('trivia-rooms/' + code);
    ref.set({
        state: { round: 1, phase: 'board', category: '', value: 0, questionText: '', accepting: false, dailyDouble: false, ddTeam: '', questionKey: '', showQR: false, timerEnd: 0, timerRunning: false, answerRevealed: false, wageringOpen: false, imageUrl: '', boardControl: '', intermissionEnd: 0 }
    });
}

function deleteRoom(code) {
    if (!confirm('Permanently DELETE room "' + code + '"?\n\nThis cannot be undone. All game data will be lost.')) return;
    db.ref('trivia-rooms/' + code).remove();
}

function refresh() {
    roomsRef.once('value', snap => {
        allRooms = snap.val() || {};
        render();
    });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
