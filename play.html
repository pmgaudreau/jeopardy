<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDK NINE Trivia Night — Play</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        :root{--bg:#000;--card:#111;--elev:#1a1a1a;--inp:#0d0d0d;--gold:#FFD700;--gold-dim:#b8960f;--gold-bright:#ffe44d;--red:#e63946;--green:#2ecc71;--blue:#4a90d9;--text:#fff;--tsec:#b0b0b0;--tmut:#666;--border:#333;--radius:12px;--fh:'Oswald','Impact',sans-serif;--fs:'Rajdhani','Inter',sans-serif;--fb:'Inter',system-ui,sans-serif;}
        body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;}
        .hidden{display:none!important;}
        input[type="text"],input[type="number"],textarea{width:100%;padding:.85rem 1rem;background:var(--inp);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--fb);font-size:1.05rem;outline:none;-webkit-appearance:none;}
        input:focus,textarea:focus{border-color:var(--gold);}
        .btn{display:inline-flex;align-items:center;justify-content:center;width:100%;padding:1rem;border:none;border-radius:var(--radius);font-family:var(--fs);font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;}
        .btn:active{transform:scale(.97);}.btn:disabled{opacity:.5;cursor:not-allowed;}
        .btn-gold{background:var(--gold);color:#000;}.btn-green{background:var(--green);color:#fff;}.btn-blue{background:var(--blue);color:#fff;}

        /* ═══ JOIN ═══ */
        .join{flex:1;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
        .join-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem 1.5rem;max-width:420px;width:100%;text-align:center;}
        .join-card h1{font-family:var(--fh);font-size:2.2rem;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.1rem;}
        .join-card .sub{font-family:var(--fs);font-size:.9rem;color:var(--tsec);margin-bottom:1.5rem;}
        .fg{margin-bottom:1rem;text-align:left;}
        .fg label{display:block;font-size:.8rem;color:var(--tmut);margin-bottom:.3rem;font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
        .err{color:var(--red);font-size:.85rem;margin-top:.75rem;}

        /* Avatar Grid */
        .avatar-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.4rem;margin-bottom:1rem;}
        .avatar-opt{
            display:flex;flex-direction:column;align-items:center;gap:.2rem;
            padding:.6rem .3rem;border:2px solid var(--border);border-radius:10px;
            background:var(--elev);cursor:pointer;transition:all .15s;
        }
        .avatar-opt:hover{border-color:var(--gold-dim);}
        .avatar-opt.selected{border-color:var(--gold);background:rgba(255,215,0,.08);box-shadow:0 0 12px rgba(255,215,0,.2);}
        .avatar-opt.taken{opacity:.3;cursor:not-allowed;pointer-events:none;}
        .avatar-img{width:36px;height:36px;border-radius:50%;object-fit:cover;}
        .avatar-opt .name{font-size:.65rem;color:var(--tsec);font-family:var(--fs);text-transform:uppercase;letter-spacing:.03em;}
        .avatar-opt.selected .name{color:var(--gold);}
        .pc-btn{width:2.5rem;height:2.5rem;border-radius:10px;border:2px solid var(--border);background:var(--elev);color:var(--text);font-family:var(--fh);font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .2s;}
        .pc-btn.selected{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,.1);box-shadow:0 0 8px rgba(255,215,0,.2);}

        /* ═══ GAME ═══ */
        #game{flex:1;display:none;flex-direction:column;}
        .game-hdr{background:var(--card);border-bottom:1px solid var(--border);padding:.6rem 1rem;display:flex;align-items:center;justify-content:space-between;}
        .team-lbl{display:flex;align-items:center;gap:.4rem;font-family:var(--fs);font-weight:700;font-size:.95rem;}
        .team-lbl .av{display:flex;align-items:center;}.team-lbl .av img{width:28px;height:28px;border-radius:50%;object-fit:cover;}
        .score-badge{background:var(--gold);color:#000;font-family:var(--fh);font-weight:800;padding:.3rem .85rem;border-radius:20px;font-size:.9rem;}

        .game-body{flex:1;display:flex;flex-direction:column;padding:1rem;gap:.75rem;}

        .q-info{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem;text-align:center;}
        .q-info .round{font-family:var(--fs);font-size:.75rem;color:var(--tmut);text-transform:uppercase;letter-spacing:2px;margin-bottom:.3rem;}
        .q-info .cat{font-family:var(--fh);font-size:1.5rem;font-weight:700;color:var(--gold);text-transform:uppercase;line-height:1.2;margin-bottom:.2rem;}
        .q-info .val{font-family:var(--fh);font-size:1.8rem;font-weight:700;color:var(--gold-bright);}
        .q-info .dd-lbl{display:inline-block;background:var(--red);color:#fff;font-family:var(--fh);font-size:.75rem;padding:.2rem .7rem;border-radius:999px;margin-top:.4rem;}

        .q-txt-card{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--gold);border-radius:var(--radius);padding:1rem 1.25rem;}
        .q-txt-card .question{font-size:1.1rem;line-height:1.5;}

        .state-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;flex:1;display:flex;flex-direction:column;gap:.75rem;}

        /* Timer on phone */
        .phone-timer{text-align:center;padding:.5rem 0;}
        .phone-timer .time{font-family:var(--fh);font-size:2rem;font-weight:700;color:var(--gold);font-variant-numeric:tabular-nums;}
        .phone-timer .time.danger{color:var(--red);}

        .wait{text-align:center;padding:2rem .5rem;}
        .wait .dots{font-size:2rem;color:var(--gold);animation:pulse 1.5s ease-in-out infinite;}
        .wait .msg{color:var(--tmut);font-size:.95rem;margin-top:.5rem;}
        @keyframes pulse{0%,100%{opacity:.3;}50%{opacity:1;}}

        .answer-area textarea{flex:1;min-height:80px;resize:none;font-size:1.1rem;padding:1rem;}

        .submitted{text-align:center;padding:2rem .5rem;}
        .submitted .check{font-size:3rem;color:var(--green);}
        .submitted .label{font-size:1.1rem;font-weight:600;color:var(--green);}
        .submitted .echo{color:var(--tmut);font-size:.85rem;margin-top:.5rem;}

        .dd-spec{text-align:center;padding:2rem .5rem;}
        .dd-spec .star{font-size:2.5rem;}
        .dd-spec .tn{color:var(--gold);font-weight:700;font-size:1.1rem;}
        .dd-spec .msg{color:var(--tmut);font-size:.9rem;margin-top:.25rem;}

        .wager-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;text-align:center;}
        .wager-card h3{font-family:var(--fh);color:var(--gold);font-size:1.1rem;margin-bottom:.5rem;text-transform:uppercase;}
        .wager-card .note{color:var(--tmut);font-size:.85rem;margin-bottom:1rem;}
        .wager-card input[type="number"]{text-align:center;font-size:1.5rem;font-weight:700;font-family:var(--fh);margin-bottom:.75rem;}
        .wager-locked{padding:.75rem;background:rgba(46,204,113,.1);border:1px solid var(--green);border-radius:var(--radius);}
        .wager-locked .amt{font-family:var(--fh);font-size:1.5rem;font-weight:800;color:var(--gold);}
        .wager-locked .lbl{font-size:.8rem;color:var(--green);margin-top:.15rem;}

        .offline-bar{background:var(--red);color:#fff;text-align:center;padding:.4rem;font-family:var(--fs);font-size:.8rem;font-weight:600;letter-spacing:.04em;}

        @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
        .fade-in{animation:fadeIn .25s ease;}
    </style>
</head>
<body>

<!-- ═══ JOIN ═══ -->
<div class="join" id="join-screen">
<div class="join-card">
    <img src="Logo transparent.png" alt="PDK NINE" style="width:120px;height:auto;margin-bottom:.5rem;">
    <h1 style="font-size:1.5rem;margin-top:0;">PDK NINE</h1>
    <div class="sub">Trivia Night — Join the Game</div>
    <div class="fg">
        <label>Room Code</label>
        <input type="text" id="inp-room" placeholder="e.g. TRIVIA" maxlength="12" autocomplete="off" autocorrect="off" autocapitalize="characters"
               style="text-transform:uppercase;text-align:center;font-size:1.3rem;font-weight:700;letter-spacing:2px;font-family:var(--fh);">
    </div>
    <div class="fg">
        <label>Team Name</label>
        <input type="text" id="inp-name" placeholder="Your team name" maxlength="30" autocomplete="off" autocorrect="off">
    </div>
    <div class="fg">
        <label>Players on Team</label>
        <div style="display:flex;gap:.5rem;justify-content:center;" id="player-count-btns">
            <button type="button" class="pc-btn selected" onclick="setPlayerCount(1)">1</button>
            <button type="button" class="pc-btn" onclick="setPlayerCount(2)">2</button>
            <button type="button" class="pc-btn" onclick="setPlayerCount(3)">3</button>
            <button type="button" class="pc-btn" onclick="setPlayerCount(4)">4</button>
            <button type="button" class="pc-btn" onclick="setPlayerCount(5)">5</button>
        </div>
    </div>
    <div class="fg">
        <label>Choose Your Avatar</label>
        <div class="avatar-grid" id="avatar-grid"></div>
    </div>
    <button class="btn btn-gold" onclick="joinRoom()">Join Game</button>
    <p class="err" id="join-err"></p>
</div>
</div>

<!-- ═══ GAME ═══ -->
<div id="game">
    <div class="offline-bar hidden" id="offline-bar">Reconnecting...</div>
    <div class="game-hdr">
        <span class="team-lbl"><img src="Logo transparent.png" alt="" style="width:20px;height:20px;object-fit:contain;vertical-align:middle;margin-right:.3rem;opacity:.7;"><span class="av" id="my-avatar"></span><span id="my-name"></span></span>
        <span class="score-badge" id="my-score">$0</span>
    </div>
    <div class="game-body">
        <div class="q-info" id="q-info">
            <div class="round" id="g-round">Round 1</div>
            <div class="cat" id="g-cat">—</div>
            <div class="val" id="g-val">—</div>
            <div id="g-dd" class="hidden"><span class="dd-lbl">★ DAILY DOUBLE ★</span></div>
        </div>
        <div class="q-txt-card hidden" id="q-txt-card"><div class="question" id="g-qtxt"></div><img id="g-img" class="hidden" style="max-width:100%;max-height:50vh;width:100%;object-fit:contain;border-radius:var(--radius);margin-top:.75rem;" alt=""></div>

        <!-- Phone timer -->
        <div class="phone-timer hidden" id="phone-timer"><div class="time" id="phone-time">0:30</div></div>

        <div class="state-card" id="wait-card"><div class="wait"><div class="dots">• • •</div><div class="msg" id="wait-msg">Waiting for the host...</div></div></div>
        <div class="state-card hidden" id="dd-spec-card"><div class="dd-spec"><div class="star">★</div><div class="msg">Daily Double!</div><div class="tn" id="dd-spec-team"></div><div class="msg">is responding to this clue</div></div></div>
        <div class="state-card hidden" id="answer-card"><div class="answer-area" style="display:flex;flex-direction:column;gap:.75rem;flex:1;"><div class="what-is-prompt" style="font-family:var(--fh);font-size:1.3rem;color:var(--gold);font-weight:700;text-align:center;margin-bottom:.25rem;">What is...</div><textarea id="answer-input" placeholder="Your response in question form" autocomplete="off" autocorrect="off"></textarea><button class="btn btn-green" id="submit-btn" onclick="submitAnswer()">Submit Response</button><button class="btn" id="pass-btn" onclick="passAnswer()" style="background:var(--elev);color:var(--tmut);font-size:.9rem;padding:.7rem;">Pass — I don't know</button></div></div>
        <div class="state-card hidden" id="submitted-card"><div class="submitted"><div class="check" id="submitted-icon">✓</div><div class="label" id="submitted-label">Response Submitted!</div><div class="echo" id="answer-echo"></div></div></div>
        <div class="wager-card hidden" id="wager-card">
            <h3>Set Your Wager</h3>
            <div class="note" id="wager-note">You can wager up to your current score</div>
            <div id="wager-input-area"><input type="number" id="wager-input" placeholder="$0" min="0" inputmode="numeric"><button class="btn btn-gold" onclick="lockWager()" style="margin-top:.5rem;">Lock In Wager</button></div>
            <div class="wager-locked hidden" id="wager-locked"><div class="amt" id="wager-locked-amt">$0</div><div class="lbl">Wager locked in</div></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="config.js"></script>
<script>
let roomCode=null,roomRef=null,teamKey=null,teamName=null,selectedAvatar=null,playerCount=1;
let GS={},cachedScore=0,lastQKey=null,hasSubmitted=false,hasPassed=false,wagerLocked=false,answerCardShown=false;
let phoneTimerInterval=null;

// ── Avatar Grid ──
function renderAvatarGrid(takenAvatars) {
    const grid=document.getElementById('avatar-grid');
    grid.innerHTML=AVATARS.map(a=>{
        const taken=takenAvatars.includes(a.id);
        const sel=selectedAvatar===a.id;
        return`<div class="avatar-opt${sel?' selected':''}${taken?' taken':''}" onclick="${taken?'':`pickAvatar('${a.id}')`}" style="${sel?`border-color:${a.color};box-shadow:0 0 12px ${a.color}40;`:''}"><img src="avatars/${a.id}.png" class="avatar-img" alt="${a.name}"><span class="name">${a.name}</span></div>`;
    }).join('');
}
function pickAvatar(id){selectedAvatar=id;renderAvatarGrid(getTakenAvatars());}
function getTakenAvatars(){return[];}

// Build initial grid
renderAvatarGrid([]);

// Watch room code to update taken avatars
let roomWatchRef=null;
document.getElementById('inp-room').addEventListener('input',function(){
    const code=this.value.trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
    if(roomWatchRef){roomWatchRef.off();roomWatchRef=null;}
    if(code.length>=2){
        roomWatchRef=db.ref('trivia-rooms/'+code+'/teams');
        roomWatchRef.on('value',snap=>{
            const ts=snap.val()||{};
            const taken=Object.values(ts).map(t=>t.avatar).filter(Boolean);
            renderAvatarGrid(taken);
            getTakenAvatars=()=>taken;
        });
    }
});

function setPlayerCount(n){
    playerCount=n;
    document.querySelectorAll('.pc-btn').forEach((b,i)=>{b.classList.toggle('selected',i+1===n);});
}

// ── Join ──
function joinRoom(){
    const code=document.getElementById('inp-room').value.trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
    const name=document.getElementById('inp-name').value.trim();
    if(!code||!name){document.getElementById('join-err').textContent='Enter room code and team name.';return;}
    if(!selectedAvatar){document.getElementById('join-err').textContent='Choose an avatar.';return;}

    roomCode=code;teamName=name;
    teamKey=name.toLowerCase().replace(/[^a-z0-9]/g,'_');
    roomRef=db.ref('trivia-rooms/'+roomCode);
    const av=AVATARS.find(a=>a.id===selectedAvatar);

    roomRef.child('state').once('value',snap=>{
        if(!snap.exists()){document.getElementById('join-err').textContent='Room not found.';return;}
        roomRef.child('teams/'+teamKey).once('value',ts=>{
            if(ts.exists()){
                const existingName=ts.val().name;
                if(existingName&&existingName.toLowerCase()!==teamName.toLowerCase()){
                    teamKey=teamKey+'_'+Math.random().toString(36).slice(2,5);
                    roomRef.child('teams/'+teamKey).set({name:teamName,score:0,wager:0,avatar:av.id,color:av.color,players:playerCount});
                } else {
                    roomRef.child('teams/'+teamKey).update({avatar:av.id,color:av.color,players:playerCount});
                }
            } else {
                roomRef.child('teams/'+teamKey).set({name:teamName,score:0,wager:0,avatar:av.id,color:av.color,players:playerCount});
            }
            try{sessionStorage.setItem('trivia_session',JSON.stringify({roomCode,teamName,teamKey,avatar:av.id,players:playerCount}));}catch(e){}
            enterGame(av);
        });
    });
}

function enterGame(av){
    document.getElementById('join-screen').style.display='none';
    document.getElementById('game').style.display='flex';
    document.getElementById('my-name').textContent=teamName;
    document.getElementById('my-avatar').innerHTML=av?'<img src="avatars/'+av.id+'.png" style="width:24px;height:24px;border-radius:50%;object-fit:cover;vertical-align:middle" alt="">':'';
    setupListeners();
}

// URL room takes precedence; auto-rejoin only if it matches
(function(){
    const urlRoom=(new URLSearchParams(window.location.search)).get('room');
    const urlRoomNorm=urlRoom?urlRoom.trim().toUpperCase().replace(/[^A-Z0-9]/g,''):'';
    if(urlRoom){
        const inp=document.getElementById('inp-room');
        inp.value=urlRoomNorm;
        inp.dispatchEvent(new Event('input',{bubbles:true}));
    }
    try{
        const saved=JSON.parse(sessionStorage.getItem('trivia_session')||'null');
        if(saved&&saved.roomCode&&saved.teamKey){
            const savedRoom=(saved.roomCode||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
            if(urlRoomNorm&&savedRoom!==urlRoomNorm){sessionStorage.removeItem('trivia_session');return;}
            if(!urlRoomNorm||savedRoom===urlRoomNorm){
                roomCode=saved.roomCode;teamName=saved.teamName;teamKey=saved.teamKey;selectedAvatar=saved.avatar;playerCount=saved.players||1;
                roomRef=db.ref('trivia-rooms/'+roomCode);
                roomRef.child('state').once('value',snap=>{
                    if(!snap.exists())return;
                    roomRef.child('teams/'+teamKey).once('value',ts=>{
                        if(!ts.exists())return;
                        const av=AVATARS.find(a=>a.id===saved.avatar);
                        enterGame(av);
                    });
                });
            }
        }
    }catch(e){}
})();

// ── Listeners ──
function setupListeners(){
    Promise.all([
        roomRef.child('state').once('value'),
        roomRef.child('teams/'+teamKey).once('value'),
        roomRef.child('currentAnswers/'+teamKey).once('value')
    ]).then(([stateSnap, teamSnap, ansSnap])=>{
        const s=stateSnap.val();
        if(s){GS=s;lastQKey=s.questionKey||null;}
        const t=teamSnap.val();
        if(t){cachedScore=t.score||0;if(t.wager>0){wagerLocked=true;showLockedWager(t.wager);}}
        const a=ansSnap.val();
        if(a){if(a.passed){hasSubmitted=true;hasPassed=true;}else if(a.answer){hasSubmitted=true;document.getElementById('answer-echo').textContent='Your response: "'+a.answer+'"';}}
        render();startPhoneTimer();

        roomRef.child('state').on('value',snap=>{
            const s=snap.val();if(!s)return;GS=s;
            if(s.questionKey!==lastQKey){
                lastQKey=s.questionKey;hasSubmitted=false;hasPassed=false;wagerLocked=false;answerCardShown=false;resetWagerUI();
                try{navigator.vibrate(200);}catch(e){}
                if(s.questionKey&&teamKey){
                    roomRef.child('currentAnswers/'+teamKey).once('value',as=>{
                        if(as.exists()&&as.val()){
                            const v=as.val();
                            if(v.passed){hasSubmitted=true;hasPassed=true;}
                            else if(v.answer){hasSubmitted=true;hasPassed=false;document.getElementById('answer-echo').textContent='Your response: "'+v.answer+'"';}
                        }
                        render();
                    });
                    roomRef.child('teams/'+teamKey).once('value',ts=>{
                        const t=ts.val();
                        if(t&&t.wager>0){wagerLocked=true;showLockedWager(t.wager);}else{wagerLocked=false;resetWagerUI();}
                    });
                }
            }
            render();startPhoneTimer();
        });
        roomRef.child('teams/'+teamKey).on('value',snap=>{
            const t=snap.val();if(!t)return;cachedScore=t.score||0;
            document.getElementById('my-score').textContent='$'+cachedScore.toLocaleString();
            if(t.wager>0){wagerLocked=true;showLockedWager(t.wager);}else{wagerLocked=false;resetWagerUI();}
        });
        roomRef.child('currentAnswers/'+teamKey).on('value',snap=>{
            if(snap.exists()&&snap.val()){const v=snap.val();if(v.passed){hasSubmitted=true;hasPassed=true;}else if(v.answer){hasSubmitted=true;hasPassed=false;document.getElementById('answer-echo').textContent='Your response: "'+v.answer+'"';}}
            render();
        });
    });
    db.ref('.info/connected').on('value',snap=>{
        const bar=document.getElementById('offline-bar');
        if(bar)bar.classList.toggle('hidden',snap.val()===true);
    });
}

// ── Render ──
function render(){
    const{round,phase,category,value,questionText,accepting,dailyDouble,ddTeam}=GS;
    const rl={1:'Round 1',2:'Double Jeopardy',3:'Final Jeopardy'};
    document.getElementById('g-round').textContent=rl[round]||'';
    document.getElementById('g-cat').textContent=category||'Waiting...';
    document.getElementById('g-val').textContent=round===3?'WAGER':(value?'$'+value.toLocaleString():'—');
    document.getElementById('g-dd').classList.toggle('hidden',!dailyDouble);

    const qtc=document.getElementById('q-txt-card');
    if((questionText||GS.imageUrl)&&phase!=='board'&&phase!=='round-transition'&&phase!=='intermission'&&phase!=='dd-reveal'&&phase!=='final-reveal'&&phase!=='final-rankings'&&phase!=='recap'&&phase!=='gameover'){
        qtc.classList.remove('hidden');
        document.getElementById('g-qtxt').textContent=questionText||'';
        const gImg=document.getElementById('g-img');
        if(GS.imageUrl){gImg.src=GS.imageUrl;gImg.classList.remove('hidden');}else{gImg.classList.add('hidden');gImg.src='';}
    }
    else qtc.classList.add('hidden');

    const cards=['wait-card','answer-card','submitted-card','dd-spec-card','wager-card','phone-timer'];
    cards.forEach(id=>document.getElementById(id).classList.add('hidden'));

    const wageringOpen=GS.wageringOpen||false;
    const isFJ=round===3&&GS.questionKey==='final';
    const canWager=wageringOpen && !wagerLocked && (
        (dailyDouble && ddTeam === teamKey) ||
        (isFJ && cachedScore > 0)
    );
    const isDDSpectator=dailyDouble && ddTeam && ddTeam !== teamKey;

    if(phase==='dd-reveal'||phase==='final-reveal'||phase==='final-rankings'||phase==='recap'||phase==='gameover'){
        show('wait-card');
        document.getElementById('wait-msg').textContent=phase==='dd-reveal'?'Daily Double result is being revealed — look at the big screen!':phase==='gameover'?'Thanks for playing! See you next time!':phase==='recap'?'Check out the game recap on the big screen!':phase==='final-rankings'?'Final standings are on the big screen!':'Final scores are being revealed — look at the big screen!';
    } else if(phase==='intermission'){
        show('wait-card');
        document.getElementById('wait-msg').textContent='Intermission — grab a snack and stretch your legs!';
    } else if(phase==='board'||phase==='round-transition'||!category){
        show('wait-card');
        document.getElementById('wait-msg').textContent=phase==='round-transition'?'Scores are being tallied...':'Waiting for the host to select a clue...';
    } else if(canWager){
        show('wager-card');
        const boardMax=round===1?1000:2000;
        const maxWager=isFJ?Math.max(cachedScore,0):Math.max(cachedScore,boardMax);
        document.getElementById('wager-note').textContent='Wager up to $'+maxWager.toLocaleString();
    } else if(!GS.fjQuestionRevealed && !accepting){
        show('wait-card');
        document.getElementById('wait-msg').textContent=wagerLocked?'Wager locked in. Waiting for the host to reveal the clue...':'Waiting for the host to reveal the clue...';
    } else if(isFJ && cachedScore <= 0 && !hasSubmitted){
        show('wait-card');
        document.getElementById('wait-msg').textContent='You don\'t have enough points to wager in Final Jeopardy. Watch the big screen!';
    } else if(isDDSpectator&&!hasSubmitted){
        show('dd-spec-card');
        roomRef.child('teams/'+ddTeam+'/name').once('value',s=>{document.getElementById('dd-spec-team').textContent=s.val()||ddTeam;});
    } else if(hasSubmitted){
        document.getElementById('submitted-icon').textContent=hasPassed?'⏭':'✓';
        document.getElementById('submitted-label').textContent=hasPassed?'Passed':'Response Submitted!';
        document.getElementById('answer-echo').textContent=hasPassed?'You skipped this question.':'';
        show('submitted-card');
    } else if(accepting){
        show('answer-card'); show('phone-timer');
        if(!answerCardShown){document.getElementById('answer-input').value='';answerCardShown=true;try{navigator.vibrate([100,50,100]);}catch(e){}}
        document.getElementById('submit-btn').disabled=false;
        document.getElementById('submit-btn').textContent='Submit Response';
        const passBtn=document.getElementById('pass-btn');
        passBtn.disabled=false;passBtn.textContent='Pass \u2014 I don\u2019t know';
        passBtn.style.display=(dailyDouble||isFJ)?'none':'block';
    } else if(phase==='question'){
        show('wait-card');
        document.getElementById('wait-msg').textContent='Waiting for the host to open for responses...';
    } else {
        show('wait-card');
        document.getElementById('wait-msg').textContent='Waiting...';
    }
}
function show(id){const el=document.getElementById(id);el.classList.remove('hidden');el.classList.add('fade-in');}

// ── Phone Timer ──
function startPhoneTimer(){
    if(phoneTimerInterval)clearInterval(phoneTimerInterval);
    if(!GS.timerRunning||!GS.timerEnd)return;
    const d=document.getElementById('phone-time');
    phoneTimerInterval=setInterval(()=>{
        const rem=Math.max(0,Math.ceil((GS.timerEnd-Date.now())/1000));
        const m=Math.floor(rem/60),s=rem%60;
        d.textContent=m+':'+String(s).padStart(2,'0');
        d.classList.toggle('danger',rem<=5);
        if(rem===5)try{navigator.vibrate(300);}catch(e){}
        if(rem<=0)clearInterval(phoneTimerInterval);
    },250);
}

// ── Submit / Pass ──
function submitAnswer(){
    const inp=document.getElementById('answer-input'),answer=inp.value.trim();
    if(!answer){inp.style.borderColor='var(--red)';setTimeout(()=>inp.style.borderColor='',1200);return;}
    const btn=document.getElementById('submit-btn');btn.disabled=true;btn.textContent='Submitting...';
    document.getElementById('pass-btn').disabled=true;
    roomRef.child('currentAnswers/'+teamKey).set({answer,timestamp:firebase.database.ServerValue.TIMESTAMP})
        .then(()=>{hasSubmitted=true;hasPassed=false;document.getElementById('answer-echo').textContent='Your response: "'+answer+'"';render();})
        .catch(()=>{btn.disabled=false;btn.textContent='Submit Response';document.getElementById('pass-btn').disabled=false;alert('Error. Try again.');});
}
function passAnswer(){
    const btn=document.getElementById('pass-btn');btn.disabled=true;btn.textContent='Passing...';
    document.getElementById('submit-btn').disabled=true;
    roomRef.child('currentAnswers/'+teamKey).set({passed:true,timestamp:firebase.database.ServerValue.TIMESTAMP})
        .then(()=>{hasSubmitted=true;hasPassed=true;render();})
        .catch(()=>{btn.disabled=false;btn.textContent='Pass — I don\'t know';document.getElementById('submit-btn').disabled=false;alert('Error. Try again.');});
}

// ── Wager ──
function lockWager(){
    const w=parseInt(document.getElementById('wager-input').value);
    if(isNaN(w)||w<5){alert('Minimum wager is $5.');return;}
    roomRef.child('teams/'+teamKey).once('value',snap=>{
        const score=(snap.val()&&snap.val().score)||0;
        const round=GS.round||1;
        const isFJ=round===3&&GS.questionKey==='final';
        const boardMax=round===1?1000:2000;
        const max=isFJ?Math.max(score,0):Math.max(score,boardMax);
        if(w>max){alert('Maximum wager is $'+max.toLocaleString());return;}
        roomRef.child('teams/'+teamKey+'/wager').set(w).then(()=>{wagerLocked=true;showLockedWager(w);render();});
    });
}
function showLockedWager(amt){document.getElementById('wager-input-area').classList.add('hidden');document.getElementById('wager-locked').classList.remove('hidden');document.getElementById('wager-locked-amt').textContent='$'+amt.toLocaleString();}
function resetWagerUI(){document.getElementById('wager-input-area').classList.remove('hidden');document.getElementById('wager-locked').classList.add('hidden');document.getElementById('wager-input').value='';}
</script>
