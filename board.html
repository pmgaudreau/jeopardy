<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDK NINE Trivia Night — Board Display</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        :root{--bg:#000;--card:#111;--elev:#1a1a1a;--gold:#FFD700;--gold-dim:#b8960f;--gold-bright:#ffe44d;--red:#e63946;--green:#2ecc71;--blue:#4a90d9;--text:#fff;--tsec:#b0b0b0;--tmut:#666;--border:#333;--cell:#0a1640;--cell-done:#0a0a0a;--fh:'Oswald','Impact',sans-serif;--fs:'Rajdhani','Inter',sans-serif;--fb:'Inter',system-ui,sans-serif;}
        html,body{height:100%;overflow:hidden;}
        body{font-family:var(--fb);background:var(--bg);color:var(--text);display:flex;flex-direction:column;}
        .hidden{display:none!important;}

        /* ═══ LOBBY ═══ */
        #lobby{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;}
        #lobby h1{font-family:var(--fh);font-size:5rem;color:var(--gold);text-transform:uppercase;letter-spacing:.12em;text-shadow:0 0 40px rgba(255,215,0,.3);}
        #lobby .sub{font-family:var(--fs);font-size:1.8rem;color:var(--tsec);text-transform:uppercase;letter-spacing:.1em;}
        #lobby .code{font-family:var(--fh);font-size:2.2rem;color:var(--gold-bright);background:var(--card);border:2px solid var(--gold-dim);border-radius:12px;padding:.5rem 2rem;margin-top:1rem;letter-spacing:.1em;}
        .lobby-teams{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:.8vw;margin-top:2rem;max-width:80vw;}
        .lobby-team{display:flex;flex-direction:column;align-items:center;gap:.3vw;animation:fadeDown .4s ease;animation-fill-mode:both;}
        .lobby-team img{width:3.5vw;height:3.5vw;border-radius:50%;object-fit:cover;border:2px solid var(--gold-dim);}
        .lobby-team .lt-name{font-family:var(--fs);font-size:.9vw;font-weight:700;white-space:nowrap;max-width:8vw;overflow:hidden;text-overflow:ellipsis;}

        /* ═══ BOARD CONTROL ═══ */
        .bd-control{text-align:center;padding:.5vw 1vw;font-family:var(--fs);font-size:1.2vw;}
        .bd-control-label{color:var(--tmut);text-transform:uppercase;font-size:.9vw;letter-spacing:.06em;}
        .bd-control img{vertical-align:middle;}
        #bd-control-name{color:var(--gold);font-weight:700;font-family:var(--fh);font-size:1.4vw;}

        /* ═══ BOARD VIEW ═══ */
        #board-display{flex:1;display:none;flex-direction:column;padding:1.5vw;}
        .bd-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1vw;}
        .bd-title{font-family:var(--fh);font-size:2.2vw;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;}
        .bd-round{font-family:var(--fs);font-size:1.3vw;color:var(--tsec);text-transform:uppercase;letter-spacing:.06em;}

        .jeopardy-board{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;flex:1;margin-bottom:1vw;}
        .bd-cat{
            background:var(--elev);padding:1vw .5vw;text-align:center;
            font-family:var(--fh);font-size:1.6vw;font-weight:700;color:var(--gold);
            text-transform:uppercase;border-radius:8px 8px 0 0;
            display:flex;align-items:center;justify-content:center;line-height:1.15;
        }
        .bd-cell{
            background:var(--cell);text-align:center;
            font-family:var(--fh);font-size:2.5vw;font-weight:700;color:var(--gold);
            border-radius:4px;position:relative;
            display:flex;align-items:center;justify-content:center;
            transition:all .3s;
        }
        .bd-cell.done{background:var(--cell-done);color:var(--tmut);opacity:.35;}
        .bd-cell.done::after{content:"✕";position:absolute;font-size:4vw;color:var(--red);opacity:.7;}
        .bd-cell .dd-star{position:absolute;top:.3vw;right:.5vw;font-size:.9vw;color:var(--gold-bright);opacity:.7;}

        .bd-scores{display:flex;align-items:center;justify-content:center;gap:.8vw;flex-wrap:wrap;max-height:12vw;overflow-y:auto;}
        .bd-team{display:flex;align-items:center;gap:.4vw;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:.3vw .8vw;min-width:0;}
        .bd-team .av img{width:1.4vw;height:1.4vw;border-radius:50%;object-fit:cover;}
        .bd-team .nm{font-family:var(--fs);font-weight:700;font-size:.9vw;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:8vw;}
        .bd-team .sc{font-family:var(--fh);font-weight:800;font-size:1vw;color:var(--gold);margin-left:.3vw;white-space:nowrap;}

        /* ═══ QUESTION DISPLAY ═══ */
        #question-display{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;padding:4vw;text-align:center;position:relative;}
        .qd-cat{font-family:var(--fh);font-size:3vw;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5vw;}
        .qd-val{font-family:var(--fh);font-size:4vw;font-weight:700;color:var(--gold-bright);margin-bottom:2vw;}
        .qd-text{font-size:2.8vw;line-height:1.4;color:var(--text);max-width:80vw;}
        .qd-answer{font-family:var(--fh);font-size:3.5vw;color:var(--green);margin-top:2vw;opacity:0;transition:opacity .5s;}
        .qd-answer.show{opacity:1;}
        .qd-timer{margin-top:2vw;}
        .qd-timer .time{font-family:var(--fh);font-size:5vw;font-weight:700;color:var(--gold);font-variant-numeric:tabular-nums;transition:color .2s;}
        .qd-timer .time.danger{color:var(--red);}
        .qd-timer .bar-wrap{width:40vw;height:.6vw;background:var(--elev);border-radius:1vw;margin:.5vw auto 0;overflow:hidden;}
        .qd-timer .bar{height:100%;background:var(--gold);border-radius:1vw;transition:width .25s linear,background .2s;}
        .qd-timer .bar.danger{background:var(--red);}
        .qd-status{font-family:var(--fs);font-size:1.5vw;color:var(--green);margin-top:1vw;letter-spacing:.06em;text-transform:uppercase;}
        .qd-answer-count{font-family:var(--fs);font-size:1.3vw;color:var(--tsec);margin-top:.5vw;letter-spacing:.04em;}

        /* ═══ DAILY DOUBLE ═══ */
        #dd-display{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;}
        .dd-star-big{font-size:10vw;animation:ddPulse 1s ease-in-out infinite alternate;}
        .dd-title{font-family:var(--fh);font-size:6vw;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;text-shadow:0 0 60px rgba(255,215,0,.5);}
        .dd-team-pick{font-family:var(--fs);font-size:2vw;color:var(--tsec);margin-top:1vw;}
        @keyframes ddPulse{from{transform:scale(.9);opacity:.7;}to{transform:scale(1.1);opacity:1;}}

        /* ═══ ROUND TRANSITION ═══ */
        #transition-display{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;padding:4vw;gap:2vw;}
        .tr-title{font-family:var(--fh);font-size:4vw;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;animation:fadeDown .6s ease;}
        .tr-scores{display:flex;flex-direction:column;gap:.6vw;width:70vw;max-width:900px;max-height:70vh;overflow-y:auto;}
        .tr-row{
            display:flex;align-items:center;gap:.8vw;background:var(--card);border:1px solid var(--border);
            border-radius:10px;padding:.7vw 1.5vw;animation:slideIn .5s ease;animation-fill-mode:both;
        }
        .tr-row .rank{font-family:var(--fh);font-size:1.8vw;font-weight:800;color:var(--tmut);min-width:2.5vw;text-align:center;}
        .tr-row:first-child .rank{color:var(--gold);}
        .tr-row .av img{width:2vw;height:2vw;border-radius:50%;object-fit:cover;}
        .tr-row .nm{flex:1;font-family:var(--fs);font-weight:700;font-size:1.4vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .tr-row .sc{font-family:var(--fh);font-weight:800;font-size:1.8vw;color:var(--gold);}
        .tr-next{font-family:var(--fh);font-size:2.5vw;color:var(--gold-bright);text-transform:uppercase;animation:fadeDown 1s ease 1.5s;animation-fill-mode:both;}
        @keyframes fadeDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
        @keyframes slideIn{from{opacity:0;transform:translateX(-30px);}to{opacity:1;transform:translateX(0);}}

        /* ═══ FINAL REVEAL ═══ */
        #reveal-display{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;padding:4vw;position:relative;}
        .fr-leader-bar{position:absolute;top:2vw;right:3vw;text-align:right;}
        .fr-leader-label{font-family:var(--fs);font-size:1.2vw;color:var(--tmut);text-transform:uppercase;letter-spacing:.06em;}
        .fr-leader-name{font-family:var(--fh);font-size:2vw;color:var(--gold-bright);}
        .fr-leader-score{font-family:var(--fh);font-size:1.6vw;color:var(--gold);}

        .fr-card{display:flex;flex-direction:column;align-items:center;gap:1.5vw;animation:frSlide .6s ease;}
        .fr-avatar img{width:8vw;height:8vw;border-radius:50%;object-fit:cover;border:4px solid var(--gold-dim);box-shadow:0 0 40px rgba(255,215,0,.15);}
        .fr-name{font-family:var(--fh);font-size:3.5vw;text-transform:uppercase;letter-spacing:.06em;}
        .fr-stage-label{font-family:var(--fs);font-size:1.4vw;color:var(--tmut);text-transform:uppercase;letter-spacing:.08em;}
        .fr-detail{font-family:var(--fh);font-size:5vw;font-weight:700;min-height:6vw;display:flex;align-items:center;}
        .fr-detail.correct{color:var(--green);}
        .fr-detail.incorrect{color:var(--red);}
        .fr-math{font-family:var(--fh);font-size:2vw;color:var(--tsec);margin-bottom:.5vw;}
        @keyframes frSlide{from{opacity:0;transform:scale(.9) translateY(30px);}to{opacity:1;transform:scale(1) translateY(0);}}
        @keyframes frPop{from{opacity:0;transform:scale(.5);}to{opacity:1;transform:scale(1);}}
        @keyframes frCount{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

        /* ═══ FINAL RANKINGS ═══ */
        #rankings-display{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;padding:3vw;gap:1.5vw;}
        .rk-title{font-family:var(--fh);font-size:4vw;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;text-shadow:0 0 40px rgba(255,215,0,.3);animation:fadeDown .6s ease;}
        .rk-list{display:flex;flex-direction:column;gap:.5vw;width:70vw;max-width:900px;max-height:70vh;overflow-y:auto;}
        .rk-row{
            display:flex;align-items:center;gap:1vw;border-radius:12px;padding:.8vw 2vw;
            animation:slideIn .5s ease;animation-fill-mode:both;background:var(--card);border:1px solid var(--border);
        }
        .rk-row.gold{background:linear-gradient(135deg,#2a2000,#1a1500);border-color:var(--gold);}
        .rk-row.silver{background:linear-gradient(135deg,#1a1a1e,#141417);border-color:#c0c0c0;}
        .rk-row.bronze{background:linear-gradient(135deg,#1c1410,#12100c);border-color:#cd7f32;}
        .rk-row .rank{font-family:var(--fh);font-size:2.2vw;font-weight:800;min-width:3vw;text-align:center;color:var(--tmut);}
        .rk-row.gold .rank{color:var(--gold);font-size:2.8vw;}
        .rk-row.silver .rank{color:#c0c0c0;}
        .rk-row.bronze .rank{color:#cd7f32;}
        .rk-row .av img{width:2.5vw;height:2.5vw;border-radius:50%;object-fit:cover;}
        .rk-row.gold .av img{width:3.5vw;height:3.5vw;border:2px solid var(--gold);}
        .rk-row .nm{flex:1;font-family:var(--fs);font-weight:700;font-size:1.6vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .rk-row.gold .nm{font-size:2vw;}
        .rk-row .sc{font-family:var(--fh);font-weight:800;font-size:2vw;color:var(--gold);}
        .rk-row.gold .sc{font-size:2.8vw;}
        .rk-crown{font-size:2.5vw;margin-right:.3vw;}

        /* ═══ QR OVERLAY ═══ */
        #qr-overlay{
            position:fixed;inset:0;background:rgba(0,0,0,.95);
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            z-index:200;opacity:0;transition:opacity .3s ease;pointer-events:none;gap:2vw;
        }
        #qr-overlay.show{opacity:1;pointer-events:auto;}
        #qr-overlay h3{font-family:var(--fh);font-size:4vw;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;}
        #qr-box{background:#fff;padding:24px;border-radius:16px;box-shadow:0 0 60px rgba(255,215,0,.2);line-height:0;}
        #qr-box canvas,#qr-box img{display:block;border-radius:4px;}
        #qr-overlay .url{font-family:var(--fh);font-size:2vw;color:var(--gold-bright);letter-spacing:.05em;}
        #qr-overlay .room-hint{font-family:var(--fs);font-size:1.5vw;color:var(--tsec);}

        /* ═══ CONNECT ═══ */
        #connect-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;}
        #connect-screen h2{font-family:var(--fh);font-size:2rem;color:var(--gold);}
        #connect-screen input{width:300px;padding:.8rem 1rem;background:var(--card);border:2px solid var(--border);border-radius:12px;color:var(--text);font-family:var(--fh);font-size:1.5rem;text-align:center;text-transform:uppercase;letter-spacing:2px;outline:none;}
        #connect-screen input:focus{border-color:var(--gold);}
        #connect-screen button{padding:.8rem 2rem;background:var(--gold);color:#000;border:none;border-radius:12px;font-family:var(--fh);font-size:1.2rem;font-weight:700;cursor:pointer;}
    </style>
</head>
<body>

<!-- Connect screen (if no room param) -->
<div id="connect-screen" class="hidden">
    <h2>Board Display</h2>
    <input type="text" id="connect-room" placeholder="ROOM CODE" maxlength="12">
    <button onclick="connectRoom()">Connect</button>
</div>

<!-- Lobby (before game starts or idle) -->
<div id="lobby" class="hidden">
    <h1>PDK NINE</h1>
    <div class="sub">Trivia Night</div>
    <div class="code" id="lobby-code"></div>
    <div class="lobby-teams" id="lobby-teams"></div>
</div>

<!-- Board grid -->
<div id="board-display" class="hidden">
    <div class="bd-control hidden" id="bd-control"><span class="bd-control-label">Board Control:</span> <span id="bd-control-name"></span></div>
    <div class="bd-header">
        <span class="bd-title">PDK NINE TRIVIA</span>
        <span class="bd-round" id="bd-round">Round 1</span>
    </div>
    <div class="jeopardy-board" id="bd-grid"></div>
    <div class="bd-scores" id="bd-scores"></div>
</div>

<!-- Active question -->
<div id="question-display" class="hidden">
    <div class="qd-cat" id="qd-cat"></div>
    <div class="qd-val" id="qd-val"></div>
    <div class="qd-text" id="qd-text"></div>
    <img id="qd-img" class="hidden" style="max-height:30vh;max-width:60vw;border-radius:12px;margin-top:1.5vw;object-fit:contain;" alt="">
    <div class="qd-answer" id="qd-answer"></div>
    <div class="qd-timer hidden" id="qd-timer"><div class="time" id="qd-time">0:30</div><div class="bar-wrap"><div class="bar" id="qd-bar" style="width:100%"></div></div></div>
    <div class="qd-status hidden" id="qd-status"></div>
    <div class="qd-answer-count hidden" id="qd-answer-count"></div>
</div>

<!-- Daily Double reveal -->
<div id="dd-display" class="hidden">
    <div class="dd-star-big">★</div>
    <div class="dd-title">DAILY DOUBLE</div>
    <div class="dd-team-pick" id="dd-pick"></div>
</div>

<!-- Round transition scoreboard -->
<div id="transition-display" class="hidden">
    <div class="tr-title" id="tr-title">Round Complete</div>
    <div class="tr-scores" id="tr-scores"></div>
    <div class="tr-next" id="tr-next">Double Jeopardy Coming Up...</div>
</div>

<!-- Final Reveal (team-by-team) -->
<div id="reveal-display" class="hidden">
    <div class="fr-leader-bar">
        <div class="fr-leader-label">Current Leader</div>
        <div class="fr-leader-name" id="fr-leader-name">—</div>
        <div class="fr-leader-score" id="fr-leader-score"></div>
    </div>
    <div class="fr-card" id="fr-card">
        <div class="fr-avatar" id="fr-avatar"></div>
        <div class="fr-name" id="fr-name"></div>
        <div class="fr-stage-label" id="fr-stage-label"></div>
        <div class="fr-math" id="fr-math"></div>
        <div class="fr-detail" id="fr-detail"></div>
    </div>
</div>

<!-- Final Rankings -->
<div id="rankings-display" class="hidden">
    <div class="rk-title">Final Standings</div>
    <div class="rk-list" id="rk-list"></div>
</div>

<!-- QR Overlay -->
<div id="qr-overlay">
    <h3>Join the Game!</h3>
    <div id="qr-box"></div>
    <div class="url" id="qr-url"></div>
    <div class="room-hint">Room Code: <span id="qr-room" style="color:var(--gold);font-family:var(--fh);font-weight:700;font-size:1.8vw;letter-spacing:2px;"></span></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="config.js"></script>
<script>
let roomCode=null,roomRef=null;
let GS={},prevPhase=null,prevQKey=null,teams={},boardQ={},categories={};
let timerInterval=null,timerDuration=30;
let finalReveal=null,prevFRKey='';
let thinkMusicPlaying=false;
let answerCount=0;

// ═══ SOUND EFFECTS ═══
const SFX=(()=>{
    let ctx=null;
    function getCtx(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx;}
    function tone(freq,dur,type='sine',vol=0.25,delay=0){
        const c=getCtx(),o=c.createOscillator(),g=c.createGain();
        o.type=type;o.frequency.value=freq;g.gain.value=0;
        g.gain.setValueAtTime(0,c.currentTime+delay);
        g.gain.linearRampToValueAtTime(vol,c.currentTime+delay+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+delay+dur);
        o.connect(g);g.connect(c.destination);
        o.start(c.currentTime+delay);o.stop(c.currentTime+delay+dur);
    }
    return{
        dailyDouble(){tone(330,.15,'square',.2,0);tone(440,.15,'square',.2,.12);tone(554,.2,'square',.2,.24);tone(659,.4,'square',.25,.36);},
        questionReveal(){tone(440,.08,'sine',.15,0);tone(554,.08,'sine',.15,.06);tone(659,.12,'sine',.2,.12);},
        tick(){tone(1000,.04,'square',.08);},
        timesUp(){tone(220,.4,'sawtooth',.3,0);tone(185,.5,'sawtooth',.25,.15);},
        correct(){tone(523,.12,'sine',.25,0);tone(659,.25,'sine',.3,.12);},
        roundEnd(){[523,587,659,784,1047].forEach((f,i)=>tone(f,.25,'sine',.25,i*.12));},
        wrong(){tone(196,.3,'sawtooth',.15,0);tone(165,.4,'sawtooth',.12,.15);},
        revealTeam(){tone(392,.12,'sine',.2,0);tone(494,.12,'sine',.2,.1);tone(587,.2,'sine',.25,.2);},
        revealScore(){tone(523,.1,'sine',.2,0);tone(659,.1,'sine',.2,.08);tone(784,.3,'sine',.3,.16);},
        winner(){[523,659,784,1047,784,1047].forEach((f,i)=>tone(f,.2,'sine',.3,i*.1));},
        wrongBuzz(){tone(150,.5,'sawtooth',.2);},
        thinkMusic:{
            _nodes:[],_timeout:null,
            start(){
                this.stop();
                const c=getCtx();
                const bpm=200,beat=60/bpm;
                // ~30s melody loop, original bouncy feel in C major
                const melody=[
                    // Phrase 1
                    [262,1],[294,1],[330,1],[262,1],[330,.5],[349,.5],[330,1],
                    [294,1],[262,1],[294,1],[262,2],
                    // Phrase 2
                    [262,1],[294,1],[330,1],[262,1],[330,.5],[349,.5],[330,1],
                    [392,1],[349,1],[330,1],[294,2],
                    // Phrase 3
                    [262,1],[294,1],[330,1],[262,1],[392,1],[349,.5],[330,.5],
                    [294,1],[330,1],[294,1],[262,2],
                    // Phrase 4
                    [294,1],[330,1],[349,1],[330,1],[294,.5],[330,.5],[294,1],
                    [262,1],[294,1],[330,1],[262,2],
                ];
                const totalBeats=melody.reduce((s,n)=>s+n[1],0);
                const loopDur=totalBeats*beat;
                const schedule=(offset)=>{
                    let t=offset;
                    melody.forEach(([freq,dur])=>{
                        const d=dur*beat;
                        const o=c.createOscillator(),g=c.createGain();
                        o.type='sine';o.frequency.value=freq;
                        g.gain.setValueAtTime(0,c.currentTime+t);
                        g.gain.linearRampToValueAtTime(0.12,c.currentTime+t+0.03);
                        g.gain.setValueAtTime(0.12,c.currentTime+t+d*0.7);
                        g.gain.linearRampToValueAtTime(0,c.currentTime+t+d*0.95);
                        o.connect(g);g.connect(c.destination);
                        o.start(c.currentTime+t);o.stop(c.currentTime+t+d);
                        this._nodes.push(o,g);
                        t+=d;
                    });
                };
                schedule(0);
                const loop=()=>{
                    schedule(0);
                    this._timeout=setTimeout(loop,loopDur*1000);
                };
                this._timeout=setTimeout(loop,loopDur*1000);
            },
            stop(){
                if(this._timeout){clearTimeout(this._timeout);this._timeout=null;}
                this._nodes.forEach(n=>{try{n.disconnect();}catch(e){}});
                this._nodes=[];
            }
        }
    };
})();

// Resume AudioContext on any click (autoplay policy)
document.addEventListener('click',()=>{try{const c=new(window.AudioContext||window.webkitAudioContext)();c.resume();c.close();}catch(e){}},{once:true});

// ═══ CONNECT ═══
function init(){
    const params=new URLSearchParams(window.location.search);
    const r=params.get('room');
    if(r){roomCode=r.toUpperCase();startListening();}
    else{document.getElementById('connect-screen').classList.remove('hidden');}
}
function connectRoom(){
    const r=document.getElementById('connect-room').value.trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
    if(!r)return;roomCode=r;
    document.getElementById('connect-screen').classList.add('hidden');
    startListening();
}
function startListening(){
    roomRef=db.ref('trivia-rooms/'+roomCode);
    document.getElementById('lobby-code').textContent=roomCode;
    showScreen('lobby');
    generateQR();
    roomRef.child('state').on('value',s=>{const v=s.val();if(!v)return;GS=v;onStateChange();});
    roomRef.child('teams').on('value',s=>{teams=s.val()||{};renderScores();renderLobbyTeams();renderBoardControl();});
    roomRef.child('currentAnswers').on('value',s=>{answerCount=s.val()?Object.keys(s.val()).length:0;updateAnswerCount();});
    roomRef.child('board').on('value',s=>{boardQ=s.val()||{};if(GS.phase==='board')renderGrid();});
    roomRef.child('categories').on('value',s=>{categories=s.val()||{};if(GS.phase==='board')renderGrid();});
    roomRef.child('finalReveal').on('value',s=>{finalReveal=s.val();if(GS.phase==='final-reveal')renderFinalReveal();if(GS.phase==='final-rankings')showFinalRankings();});
}

// ═══ QR CODE ═══
function generateQR(){
    const base=window.location.href.replace(/\/[^\/]*$/,'/');
    const url=base+'play.html?room='+roomCode;
    document.getElementById('qr-url').textContent=url;
    document.getElementById('qr-room').textContent=roomCode;
    const box=document.getElementById('qr-box');
    box.innerHTML='';
    try{new QRCode(box,{text:url,width:460,height:460,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});}catch(e){console.error('QR init error:',e);}
}
function updateQR(){document.getElementById('qr-overlay').classList.toggle('show',!!GS.showQR);}

// ═══ STATE MACHINE ═══
function onStateChange(){
    updateQR();
    const{phase,dailyDouble,ddTeam,round}=GS;

    if(phase==='round-transition'&&prevPhase!=='round-transition'){
        showTransition();SFX.roundEnd();
    } else if(phase==='final-reveal'){
        renderFinalReveal();
    } else if(phase==='final-rankings'){
        showFinalRankings();
    } else if(phase==='question'&&dailyDouble&&GS.questionKey!==prevQKey){
        showDailyDouble();SFX.dailyDouble();
        setTimeout(()=>{if(GS.phase==='question')showQuestion();},3000);
    } else if(phase==='question'&&!dailyDouble&&GS.questionKey!==prevQKey){
        showQuestion();SFX.questionReveal();
    } else if(phase==='question'){
        updateQuestion();
    } else if(phase==='board'){
        showBoard();
    }
    renderBoardControl();

    if(GS.timerRunning)startTimer();else stopTimer();

    const wantThink=phase==='question'&&round===3&&GS.accepting;
    if(wantThink&&!thinkMusicPlaying){SFX.thinkMusic.start();thinkMusicPlaying=true;}
    else if(!wantThink&&thinkMusicPlaying){SFX.thinkMusic.stop();thinkMusicPlaying=false;}

    prevPhase=phase;prevQKey=GS.questionKey;
}

// ═══ SCREENS ═══
function showScreen(id){['lobby','board-display','question-display','dd-display','transition-display','reveal-display','rankings-display'].forEach(s=>{const el=document.getElementById(s);el.classList.add('hidden');el.style.display='';});const el=document.getElementById(id);el.classList.remove('hidden');el.style.display='flex';}

function renderLobbyTeams(){
    const el=document.getElementById('lobby-teams');
    const sorted=Object.entries(teams).sort((a,b)=>(a[1].name||'').localeCompare(b[1].name||''));
    el.innerHTML=sorted.map(([k,t],i)=>{
        const col=avatarColor(t.avatar);
        return`<div class="lobby-team" style="animation-delay:${i*.08}s">${avatarImg(t.avatar,'3.5vw')}<span class="lt-name" style="color:${col}">${esc(t.name||k)}</span></div>`;
    }).join('')||(teams&&Object.keys(teams).length?'':'');
}

function updateAnswerCount(){
    const el=document.getElementById('qd-answer-count');
    const total=Object.keys(teams).length;
    if(GS.phase==='question'&&GS.accepting&&total>0){
        el.textContent=answerCount+' of '+total+' answered';
        el.classList.remove('hidden');
    } else {
        el.classList.add('hidden');
    }
}

function showBoard(){
    showScreen('board-display');
    const rl={1:'Round 1',2:'Double Jeopardy',3:'Final Jeopardy'};
    document.getElementById('bd-round').textContent=rl[GS.round]||'';
    renderGrid();
    renderBoardControl();
}
function renderBoardControl(){
    const el=document.getElementById('bd-control');
    const tk=GS.boardControl;
    if(tk&&teams[tk]){
        el.classList.remove('hidden');
        document.getElementById('bd-control-name').innerHTML=avatarImg(tk?teams[tk].avatar:'','1.8vw')+' '+esc(teams[tk].name||tk);
    } else {
        el.classList.add('hidden');
    }
}

function renderGrid(){
    const g=document.getElementById('bd-grid'),r=GS.round;
    if(r===3){g.innerHTML='<div style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:4vw;color:var(--gold);text-transform:uppercase;">Final Jeopardy</div>';return;}
    const cats=r===1?(categories.round1||[]):(categories.round2||[]);
    const vals=r===1?[200,400,600,800,1000]:[400,800,1200,1600,2000];
    if(!cats.length){g.innerHTML='';return;}
    let h='';
    cats.forEach(c=>{h+=`<div class="bd-cat">${esc(c)}</div>`;});
    vals.forEach((v,row)=>{cats.forEach((c,col)=>{
        const k=`r${r}_c${col}_r${row}`,q=boardQ[k],done=q&&q.completed,dd=q&&q.dailyDouble;
        h+=`<div class="bd-cell${done?' done':''}">$${v}</div>`;
    });});
    g.innerHTML=h;
}

function renderScores(){
    const sorted=Object.entries(teams).sort((a,b)=>(b[1].score||0)-(a[1].score||0));
    document.getElementById('bd-scores').innerHTML=sorted.map(([k,t])=>{
        const streak=t.streak||0;
        const fire=streak>=3?'<span style="font-size:.7vw;margin-left:.2vw;" title="'+streak+' in a row">🔥</span>':'';
        return`<div class="bd-team" style="border-color:${avatarColor(t.avatar)}44"><span class="av">${avatarImg(t.avatar,'1.8vw')}</span><span class="nm">${esc(t.name||k)}${fire}</span><span class="sc">$${(t.score||0).toLocaleString()}</span></div>`;
    }).join('');
}

// ═══ DAILY DOUBLE ═══
function showDailyDouble(){
    showScreen('dd-display');
    const tn=GS.ddTeam&&teams[GS.ddTeam]?teams[GS.ddTeam].name:GS.ddTeam;
    document.getElementById('dd-pick').textContent=tn?`${tn} is answering!`:'';
}

// ═══ QUESTION ═══
function showQuestion(){
    showScreen('question-display');
    document.getElementById('qd-cat').textContent=GS.category||'';
    document.getElementById('qd-val').textContent=GS.value?'$'+GS.value.toLocaleString():'WAGER';
    document.getElementById('qd-text').textContent=GS.questionText||'';
    const img=document.getElementById('qd-img');
    if(GS.imageUrl){img.src=GS.imageUrl;img.classList.remove('hidden');}else{img.classList.add('hidden');img.src='';}
    document.getElementById('qd-answer').textContent='';
    document.getElementById('qd-answer').classList.remove('show');
    document.getElementById('qd-timer').classList.add('hidden');
    document.getElementById('qd-status').classList.add('hidden');
    updateQuestion();
}
function updateQuestion(){
    const ans=document.getElementById('qd-answer');
    if(GS.answerRevealed){
        roomRef.child(GS.questionKey==='final'?'final/answerText':`board/${GS.questionKey}/answerText`).once('value',s=>{
            if(s.val()){ans.textContent=s.val();ans.classList.add('show');}
        });
    } else {
        ans.classList.remove('show');
    }
    const status=document.getElementById('qd-status');
    if(GS.accepting){status.textContent='ANSWERS OPEN';status.style.color='var(--green)';status.classList.remove('hidden');}
    else if(GS.wageringOpen){status.textContent='WAGERS OPEN';status.style.color='var(--gold)';status.classList.remove('hidden');}
    else if(GS.questionKey){status.textContent='ANSWERS CLOSED';status.style.color='var(--red)';status.classList.remove('hidden');}
    updateAnswerCount();
}

// ═══ TIMER ═══
function startTimer(){
    stopTimer();
    const td=document.getElementById('qd-timer'),time=document.getElementById('qd-time'),bar=document.getElementById('qd-bar');
    td.classList.remove('hidden');
    if(!GS.timerEnd)return;
    timerDuration=Math.max(1,Math.ceil((GS.timerEnd-Date.now())/1000));
    const totalDur=timerDuration;
    let lastSec=-1;
    timerInterval=setInterval(()=>{
        const rem=Math.max(0,Math.ceil((GS.timerEnd-Date.now())/1000));
        const m=Math.floor(rem/60),s=rem%60;
        time.textContent=m+':'+String(s).padStart(2,'0');
        const pct=totalDur>0?(rem/totalDur)*100:0;
        bar.style.width=pct+'%';
        const danger=rem<=5;
        time.classList.toggle('danger',danger);
        bar.classList.toggle('danger',danger);
        if(danger&&rem>0&&rem!==lastSec&&rem<=5)SFX.tick();
        if(rem<=0&&lastSec>0)SFX.timesUp();
        lastSec=rem;
        if(rem<=0)stopTimer();
    },200);
}
function stopTimer(){if(timerInterval)clearInterval(timerInterval);timerInterval=null;}

// ═══ ROUND TRANSITION ═══
function showTransition(){
    showScreen('transition-display');
    const round=GS.round;
    const prev=round-1;
    const titles={1:'Round 1 Complete',2:'Double Jeopardy Complete'};
    const nexts={2:'Double Jeopardy Coming Up...',3:'Final Jeopardy Coming Up...'};
    document.getElementById('tr-title').textContent=titles[prev]||'Round Complete';
    document.getElementById('tr-next').textContent=nexts[round]||'';
    const sorted=Object.entries(teams).sort((a,b)=>(b[1].score||0)-(a[1].score||0));
    document.getElementById('tr-scores').innerHTML=sorted.map(([k,t],i)=>
        `<div class="tr-row" style="animation-delay:${i*.15}s;border-left:4px solid ${avatarColor(t.avatar)}"><span class="rank">${i+1}</span><span class="av">${avatarImg(t.avatar,'2.5vw')}</span><span class="nm" style="color:${avatarColor(t.avatar)}">${esc(t.name||k)}</span><span class="sc">$${(t.score||0).toLocaleString()}</span></div>`
    ).join('');
}

// ═══ FINAL REVEAL ═══
function renderFinalReveal(){
    if(!finalReveal||!finalReveal.teams)return;
    showScreen('reveal-display');
    const {teams:rt, currentIndex:idx, currentStage:stage} = finalReveal;
    if(idx>=rt.length)return;
    const t=rt[idx];
    const frKey=idx+'_'+stage;
    const isNew=frKey!==prevFRKey;
    prevFRKey=frKey;

    const card=document.getElementById('fr-card');
    if(isNew){card.style.animation='none';card.offsetHeight;card.style.animation='';}

    document.getElementById('fr-avatar').innerHTML=avatarImg(t.avatar,'8vw');
    const col=avatarColor(t.avatar);
    document.getElementById('fr-name').textContent=t.name;
    document.getElementById('fr-name').style.color=col;

    const lbl=document.getElementById('fr-stage-label');
    const detail=document.getElementById('fr-detail');
    const math=document.getElementById('fr-math');
    detail.className='fr-detail';
    math.textContent='';

    if(stage===1){
        lbl.textContent='Score before Final Jeopardy';
        detail.textContent='$'+t.preFinalScore.toLocaleString();
        if(isNew)SFX.revealTeam();
    } else if(stage===2){
        lbl.textContent='Their Wager';
        detail.textContent='$'+t.wager.toLocaleString();
        if(isNew)SFX.revealTeam();
    } else if(stage===3){
        lbl.textContent='Their Answer';
        detail.textContent='"'+t.answer+'"';
        detail.classList.add(t.correct?'correct':'incorrect');
        if(isNew){if(t.correct)SFX.correct();else SFX.wrongBuzz();}
    } else if(stage===4){
        lbl.textContent='Final Score';
        const diff=t.correct?t.wager:-t.wager;
        const sign=diff>=0?'+':'';
        math.textContent='$'+t.preFinalScore.toLocaleString()+' '+sign+' $'+Math.abs(diff).toLocaleString();
        detail.textContent='$'+t.finalScore.toLocaleString();
        if(isNew)SFX.revealScore();
    }

    updateRevealLeader(rt, idx, stage);
}

function updateRevealLeader(rt, currentIdx, currentStage){
    const revealed=rt.slice(0, currentIdx+(currentStage>=4?1:0));
    const finalized=revealed.filter((_,i)=>i<currentIdx||(i===currentIdx&&currentStage>=4));
    let leader=null;
    finalized.forEach(t=>{if(!leader||t.finalScore>leader.finalScore)leader=t;});
    const ln=document.getElementById('fr-leader-name');
    const ls=document.getElementById('fr-leader-score');
    if(leader){
        ln.textContent=leader.name;
        ln.style.color=avatarColor(leader.avatar);
        ls.textContent='$'+leader.finalScore.toLocaleString();
    } else {
        ln.textContent='—';
        ls.textContent='';
    }
}

// ═══ FINAL RANKINGS ═══
function showFinalRankings(){
    if(!finalReveal||!finalReveal.teams)return;
    showScreen('rankings-display');
    const sorted=[...finalReveal.teams].sort((a,b)=>b.finalScore-a.finalScore);
    const list=document.getElementById('rk-list');
    list.innerHTML=sorted.map((t,i)=>{
        let cls='';
        if(i===0)cls='gold';
        else if(i===1)cls='silver';
        else if(i===2)cls='bronze';
        const medal=i===0?'<span class="rk-crown">👑</span>':'';
        const col=avatarColor(t.avatar);
        return`<div class="rk-row ${cls}" style="animation-delay:${i*.2}s;${i<3?'border-left:4px solid '+col:''}"><span class="rank">${medal}${i+1}</span><span class="av">${avatarImg(t.avatar,i===0?'3.5vw':'2.5vw')}</span><span class="nm" style="color:${col}">${esc(t.name)}</span><span class="sc">$${t.finalScore.toLocaleString()}</span></div>`;
    }).join('');
    SFX.winner();
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
init();
</script>
